name: Deploy

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: windows-latest
        container:
            image: node:20

        steps:
            - uses: actions/checkout@v4
            - uses: action/setup-node@v4
              with:
                node-version: 20

            - run: npm ci
            - run: npm run build