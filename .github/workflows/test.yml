name: test

on: 
    pull_request:
        branches:
            - main
            - hemendra_1
    push:
        branches:
            -main
            -hemendra_1

jobs:
    test:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 24
            - run: npm ci
            - run: npm run build
