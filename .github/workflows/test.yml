name: test

on: 
    pull_request:
        branches:
            - main
            
    push:
        branches:
            - main

jobs:
    test:
        runs-on: windows-latest

        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                node-version: 24
            
            - run: npm install
            - run: npm run build
